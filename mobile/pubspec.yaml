name: student_attendance
description: Student Attendance Mobile App with QR Code + Location Verification
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  dio: ^5.7.0
  
  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5
  
  # Location
  geolocator: ^13.0.2
  
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
